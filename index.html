<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FPV Drone - Abandoned Subway</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #000; overflow: hidden; touch-action: none;
user-select: none; -webkit-user-select: none;
font-family: 'Courier New', monospace; position: fixed;
width: 100%; height: 100%;
}
canvas { display: block; width: 100%; height: 100%; }

#ui-overlay {
position: fixed; top: 0; left: 0;
width: 100%; height: 100%; pointer-events: none; z-index: 10;
}

#hud {
position: absolute; top: 10px; left: 10px; right: 10px;
display: flex; justify-content: space-between; align-items: flex-start;
padding: 8px 12px;
background: rgba(0,0,0,0.3);
border: 1px solid rgba(0,255,100,0.2);
border-radius: 8px;
backdrop-filter: blur(3px);
}

.hud-label {
font-size: 8px; color: rgba(0,255,100,0.5);
text-transform: uppercase; letter-spacing: 1px;
}
.hud-value { color: #00ff64; font-size: 14px; font-weight: bold;
text-shadow: 0 0 6px rgba(0,255,100,0.4); }

#battery-bar-container {
width: 80px; height: 6px;
background: rgba(0,0,0,0.5); border: 1px solid rgba(0,255,100,0.2);
border-radius: 3px; margin-top: 3px; overflow: hidden;
}
#battery-bar {
height: 100%; width: 100%;
background: linear-gradient(90deg, #ff0040, #ffaa00, #00ff64);
border-radius: 3px; transition: width 0.3s;
}

#crosshair {
position: fixed; top: 50%; left: 50%;
transform: translate(-50%, -50%);
pointer-events: none; z-index: 15;
width: 12px; height: 12px;
border: 1px solid rgba(0,255,100,0.2);
border-radius: 50%;
}
#crosshair::after {
content: ''; position: absolute;
top: 50%; left: 50%;
width: 2px; height: 2px;
background: rgba(0,255,100,0.5);
border-radius: 50%;
transform: translate(-50%, -50%);
}

#fpv-overlay {
position: fixed; top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none; z-index: 20;
}

#scanlines {
position: fixed; top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none; z-index: 21;
opacity: 0.04;
background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(255,255,255,0.3) 1px, rgba(255,255,255,0.3) 2px);
}

#signal-noise {
position: fixed; top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none; z-index: 22;
opacity: 0;
mix-blend-mode: overlay;
background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><filter id="n"><feTurbulence baseFrequency="0.9"/></filter><rect width="100" height="100" filter="url(%23n)" opacity="0.5"/></svg>');
background-size: 200px 200px;
}

#vignette {
position: fixed; top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none; z-index: 19;
background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
}

#fpv-text {
position: fixed; top: 15px; left: 15px;
color: rgba(0,255,100,0.6); font-size: 8px;
pointer-events: none; z-index: 25;
letter-spacing: 1px;
}

#signal-indicator {
position: fixed; top: 15px; right: 15px;
pointer-events: none; z-index: 25;
text-align: right;
}
.signal-bars {
display: flex; gap: 2px; justify-content: flex-end; margin-bottom: 3px;
}
.signal-bar {
width: 4px; height: 8px;
background: rgba(0,255,100,0.2);
border-radius: 1px;
}
.signal-bar.active { background: rgba(0,255,100,0.7); }

#signal-text {
color: rgba(0,255,100,0.4); font-size: 8px;
}

#rec-dot {
width: 6px; height: 6px;
background: #ff0040;
border-radius: 50%;
display: inline-block;
animation: blink 1s infinite;
margin-right: 5px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

#damage-flash, #collect-flash {
position: fixed; top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none; z-index: 50;
opacity: 0; transition: opacity 0.1s;
}
#damage-flash { background: rgba(255,0,0,0.15); }
#collect-flash { background: rgba(0,255,100,0.08); }

.warning {
position: absolute; top: 50px; left: 50%;
transform: translateX(-50%);
color: #ff0040; font-size: 11px; font-weight: bold;
text-shadow: 0 0 6px rgba(255,0,64,0.5);
opacity: 0; transition: opacity 0.2s;
}

#game-over-screen {
position: fixed; top: 0; left: 0;
width: 100%; height: 100%;
display: none; flex-direction: column;
align-items: center; justify-content: center;
z-index: 100;
background: rgba(0,0,0,0.7);
backdrop-filter: blur(8px);
pointer-events: auto;
}

#game-over-screen h1 {
color: #ff0040; font-size: 24px;
text-shadow: 0 0 20px rgba(255,0,64,0.4);
margin-bottom: 10px;
}
#final-score { color: #00ff64; font-size: 20px; margin-bottom: 5px; }
#final-zone { color: rgba(0,255,100,0.3); font-size: 10px; margin-bottom: 20px; }

.btn {
padding: 12px 40px; background: transparent;
border: 1px solid #00ff64; color: #00ff64;
font-family: 'Courier New', monospace; font-size: 14px;
cursor: pointer; text-transform: uppercase;
letter-spacing: 2px; border-radius: 3px;
pointer-events: auto;
}
.btn:active { background: rgba(0,255,100,0.1); }

#fps-counter {
position: fixed; bottom: 5px; right: 5px;
color: rgba(0,255,100,0.15); font-size: 8px;
z-index: 30; pointer-events: none;
}

#minimap {
position: fixed; top: 55px; right: 8px;
width: 30px; height: 80px;
border: 1px solid rgba(0,255,100,0.1);
border-radius: 3px;
background: rgba(0,0,0,0.2);
z-index: 15; pointer-events: none;
overflow: hidden;
}
.minimap-dot {
position: absolute; width: 3px; height: 3px;
background: #00ff64; border-radius: 50%;
left: 50%; bottom: 20%;
transform: translateX(-50%);
box-shadow: 0 0 3px rgba(0,255,100,0.4);
}

#joystick-container {
position: fixed; top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none; z-index: 30;
}
</style>
</head>
<body>

<div id="fpv-text"><span id="rec-dot"></span>REC <span id="rec-time">00:00</span></div>
<div id="signal-indicator">
<div class="signal-bars" id="signal-bars">
<div class="signal-bar"></div><div class="signal-bar"></div><div class="signal-bar"></div><div class="signal-bar"></div><div class="signal-bar"></div>
</div>
<div id="signal-text">SIGNAL: --</div>
</div>

<div id="ui-overlay">
<div id="hud">
<div>
<div class="hud-label">Battery</div>
<div id="battery-bar-container"><div id="battery-bar"></div></div>
<div class="hud-label" id="battery-text">100%</div>
</div>
<div style="text-align:center;">
<div class="hud-label">Speed</div>
<div class="hud-value" id="speed-display">0</div>
</div>
<div style="text-align:right;">
<div class="hud-value" id="score-display">0m</div>
<div class="hud-label" id="zone-display">STATION A</div>
</div>
</div>
<div class="warning" id="proximity-warning">⚠ WALL</div>
<div class="warning" id="low-battery-warning">⚠ LOW BATTERY</div>
</div>

<div id="crosshair"></div>
<div id="fpv-overlay"></div>
<div id="scanlines"></div>
<div id="signal-noise"></div>
<div id="vignette"></div>
<div id="damage-flash"></div>
<div id="collect-flash"></div>
<div id="minimap"><div class="minimap-dot"></div></div>
<div id="game-over-screen">
<h1>CONNECTION LOST</h1>
<div id="final-score">0m</div>
<div id="final-zone"></div>
<button class="btn" id="restart-btn">RECONNECT</button>
</div>
<div id="fps-counter"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';

const TW = 14, TH = 9, SEG = 40;
const ZONES = ['STATION A','MAINTENANCE','TUNNEL B','CATACOMBS','STATION C','FLOODED','TUNNEL D','STATION E','RUINS','PLATFORM F'];

// ============ TEXTURES ============
function makeTex(w, h, fn){
const c=document.createElement('canvas'); c.width=w; c.height=h;
const x=c.getContext('2d'); fn(x,w,h);
const t=new THREE.CanvasTexture(c);
t.wrapS=t.wrapT=THREE.RepeatWrapping;
t.magFilter=THREE.NearestFilter;
t.minFilter=THREE.NearestFilter;
return t;
}

// Brick - dirty aged
const texBrick=makeTex(256,256,(c,w,h)=>{
c.fillStyle='#1a0e05'; c.fillRect(0,0,w,h);
const bw=48,bh=24;
for(let y=0;y<h;y+=bh){
const off=(~~(y/bh)%2)*(bw/2);
for(let x=-bw;x<w+bw;x+=bw){
const bx=x+off;
const v=20+Math.random()*25;
c.fillStyle=`rgb(${v+10},${v+3},${v})`;
c.fillRect(bx+1,y+1,bw-2,bh-2);
// Mortar
c.fillStyle='rgba(40,35,30,0.6)';
c.fillRect(bx,y,bw,1); c.fillRect(bx,y,1,bh);
// Dirt
if(Math.random()<0.15){
c.fillStyle='rgba(30,25,10,0.4)';
c.fillRect(bx+2,y+2,bw-4,bh-4);
}
}
}
// Water stains
for(let i=0;i<8;i++){
c.fillStyle='rgba(20,15,5,0.2)';
c.fillRect(Math.random()*w,0,Math.random()*15+5,Math.random()*h*0.3+h*0.5);
}
});

// Concrete - cracked dirty
const texConc=makeTex(256,256,(c,w,h)=>{
c.fillStyle='#222222'; c.fillRect(0,0,w,h);
for(let i=0;i<2000;i++){
const v=20+Math.random()*35;
c.fillStyle=`rgb(${v},${v},${v})`;
c.fillRect(Math.random()*w,Math.random()*h,Math.random()*3,Math.random()*3);
}
// Cracks
for(let i=0;i<12;i++){
c.strokeStyle=`rgba(0,0,0,${0.2+Math.random()*0.3})`;
c.lineWidth=Math.random()*2;
c.beginPath();
let sx=Math.random()*w,sy=Math.random()*h;
c.moveTo(sx,sy);
for(let j=0;j<5;j++){
sx+=(Math.random()-0.5)*40; sy+=(Math.random()-0.5)*40;
c.lineTo(sx,sy);
}
c.stroke();
}
// Dirt patches
for(let i=0;i<10;i++){
c.fillStyle=`rgba(${30+Math.random()*20},${25+Math.random()*15},${15+Math.random()*10},0.3)`;
c.beginPath();
c.arc(Math.random()*w,Math.random()*h,3+Math.random()*8,0,Math.PI*2);
c.fill();
}
// Oil stains
for(let i=0;i<5;i++){
c.fillStyle='rgba(15,10,5,0.25)';
c.beginPath();
c.ellipse(Math.random()*w,Math.random()*h,Math.random()*20+5,Math.random()*10+3,Math.random()*Math.PI,0,Math.PI*2);
c.fill();
}
});

// Ceiling - damaged
const texCeil=makeTex(256,256,(c,w,h)=>{
c.fillStyle='#1a1a1a'; c.fillRect(0,0,w,h);
for(let i=0;i<1500;i++){
const v=12+Math.random()*20;
c.fillStyle=`rgb(${v},${v},${v})`;
c.fillRect(Math.random()*w,Math.random()*h,Math.random()*4,Math.random()*4);
}
for(let i=0;i<10;i++){
c.fillStyle=`rgba(0,0,0,${0.2+Math.random()*0.4})`;
c.fillRect(Math.random()*w,Math.random()*h,10+Math.random()*70,2+Math.random()*8);
}
// Water damage circles
for(let i=0;i<6;i++){
c.fillStyle='rgba(25,20,15,0.3)';
c.beginPath();
c.arc(Math.random()*w,Math.random()*h,5+Math.random()*15,0,Math.PI*2);
c.fill();
c.strokeStyle='rgba(30,25,20,0.2)';
c.lineWidth=1;
c.stroke();
}
});

// Rust
const texRust=makeTex(128,128,(c,w,h)=>{
c.fillStyle='#5a2a0a'; c.fillRect(0,0,w,h);
for(let y=0;y<h;y++){
const v=60+Math.sin(y*0.1)*20+Math.random()*20;
c.fillStyle=`rgb(${v+30},${v},${v-20})`;
c.fillRect(0,y,w,1);
}
for(let i=0;i<100;i++){
c.fillStyle=`rgba(${100+Math.random()*80},${40+Math.random()*40},${10+Math.random()*20},0.3)`;
c.fillRect(Math.random()*w,Math.random()*h,Math.random()*10,Math.random()*10);
}
});

// Metal - dirty
const texMetal=makeTex(128,128,(c,w,h)=>{
c.fillStyle='#444'; c.fillRect(0,0,w,h);
for(let y=0;y<h;y++){
const v=55+Math.sin(y*0.12)*15+Math.random()*15;
c.fillStyle=`rgb(${v},${v},${v+5})`;
c.fillRect(0,y,w,1);
}
// Scratches
for(let i=0;i<30;i++){
c.strokeStyle=`rgba(255,255,255,${Math.random()*0.1})`;
c.lineWidth=0.5;
c.beginPath();
c.moveTo(Math.random()*w,Math.random()*h);
c.lineTo(Math.random()*w,Math.random()*h);
c.stroke();
}
});

// Tile - dirty station
const texTile=makeTex(128,128,(c,w,h)=>{
c.fillStyle='#3a4a3a'; c.fillRect(0,0,w,h);
const ts=32;
for(let y=0;y<h;y+=ts){
for(let x=0;x<w;x+=ts){
const v=40+Math.random()*25;
c.fillStyle=`rgb(${v},${v+12},${v})`;
c.fillRect(x+1,y+1,ts-2,ts-2);
c.strokeStyle='rgba(0,0,0,0.35)';
c.lineWidth=1.5;
c.strokeRect(x,y,ts,ts);
}
}
// Missing tiles
for(let i=0;i<4;i++){
const tx=~~(Math.random()*4)*32,ty=~~(Math.random()*4)*32;
c.fillStyle='#222';
c.fillRect(tx,ty,32,32);
}
// Dirt
for(let i=0;i<15;i++){
c.fillStyle='rgba(30,25,15,0.2)';
c.fillRect(Math.random()*w,Math.random()*h,Math.random()*12,Math.random()*12);
}
});

// Gravel
const texGravel=makeTex(128,128,(c,w,h)=>{
c.fillStyle='#2a2520'; c.fillRect(0,0,w,h);
for(let i=0;i<800;i++){
const v=25+Math.random()*35;
const s=Math.random()*4+1;
c.fillStyle=`rgb(${v+5},${v+3},${v})`;
c.beginPath();
c.arc(Math.random()*w,Math.random()*h,s,0,Math.PI*2);
c.fill();
}
});

// Train body
const texTrain=makeTex(256,128,(c,w,h)=>{
c.fillStyle='#6a7a6a'; c.fillRect(0,0,w,h);
// Panel lines
for(let y=0;y<h;y+=16){
c.fillStyle='rgba(0,0,0,0.15)';
c.fillRect(0,y,w,1);
}
// Rivets
for(let y=8;y<h;y+=16){
for(let x=8;x<w;x+=16){
c.fillStyle='rgba(255,255,255,0.15)';
c.beginPath();
c.arc(x,y,1.5,0,Math.PI*2);
c.fill();
}
}
// Dirt streaks
for(let i=0;i<10;i++){
c.fillStyle='rgba(20,15,10,0.15)';
c.fillRect(0,Math.random()*h,w,Math.random()*8+2);
}
// Faded stripe
c.fillStyle='rgba(100,120,100,0.3)';
c.fillRect(0,40,w,8);
});

// Train window
const texTrainWin=makeTex(64,32,(c,w,h)=>{
c.fillStyle='#1a2a3a'; c.fillRect(0,0,w,h);
// Reflection streak
c.fillStyle='rgba(255,255,255,0.08)';
c.fillRect(10,0,8,h);
c.fillRect(35,0,5,h);
// Grime at bottom
c.fillStyle='rgba(30,25,20,0.3)';
c.fillRect(0,h-8,w,8);
});

// Graffiti
const texGraffiti=makeTex(64,64,(c,w,h)=>{
c.fillStyle='#222'; c.fillRect(0,0,w,h);
const hue=Math.random()*360;
c.fillStyle=`hsl(${hue},60%,45%)`;
c.fillRect(4,4,25,12);
c.fillStyle=`hsl(${(hue+120)%360},50%,35%)`;
c.fillRect(10,22,30,15);
c.fillStyle='rgba(255,255,255,0.6)';
c.font='bold 7px monospace';
c.fillText('X',6,15);
c.fillText('Z',15,32);
});

// Warning stripe
const texWarning=makeTex(64,32,(c,w,h)=>{
for(let x=0;x<w;x+=16){
c.fillStyle='#ffcc00';
c.fillRect(x,0,8,h);
c.fillStyle='#222';
c.fillRect(x+8,0,8,h);
}
});

// ============ MATERIALS ============
const matBrick=new THREE.MeshStandardMaterial({map:texBrick,roughness:0.9,metalness:0.05,color:0x999999});
const matFloor=new THREE.MeshStandardMaterial({map:texConc,roughness:0.95,metalness:0.05,color:0x888888});
const matGravel=new THREE.MeshStandardMaterial({map:texGravel,roughness:1,color:0x999999});
const matCeil=new THREE.MeshStandardMaterial({map:texCeil,roughness:0.9,color:0x777777});
const matTile=new THREE.MeshStandardMaterial({map:texTile,roughness:0.5,color:0x88aa88});
const matMetal=new THREE.MeshStandardMaterial({map:texMetal,roughness:0.3,metalness:0.7,color:0x999999});
const matRust=new THREE.MeshStandardMaterial({map:texRust,roughness:0.95,color:0x886644});
const matRail=new THREE.MeshStandardMaterial({color:0x888888,metalness:0.85,roughness:0.2});
const matWood=new THREE.MeshStandardMaterial({color:0x4a3520,roughness:0.95});
const matDark=new THREE.MeshStandardMaterial({color:0x222222,roughness:0.9});
const matTrain=new THREE.MeshStandardMaterial({map:texTrain,roughness:0.6,metalness:0.3,color:0x889988});
const matTrainWin=new THREE.MeshStandardMaterial({map:texTrainWin,roughness:0.1,metalness:0.5,transparent:true,opacity:0.5});
const matGlass=new THREE.MeshStandardMaterial({color:0x334455,transparent:true,opacity:0.3,roughness:0.1,metalness:0.5});
const matWater=new THREE.MeshStandardMaterial({color:0x224466,roughness:0.05,metalness:0.3,transparent:true,opacity:0.7});
const matWarning=new THREE.MeshStandardMaterial({map:texWarning,roughness:0.5});
const matConcrete=new THREE.MeshStandardMaterial({color:0x555555,roughness:0.95});
const matGlow=new THREE.MeshBasicMaterial({color:0x00ff64,transparent:true,opacity:0.7});
const matRedGlow=new THREE.MeshBasicMaterial({color:0xff2200,transparent:true,opacity:0.6});
const matWarmGlow=new THREE.MeshBasicMaterial({color:0xffddaa,transparent:true,opacity:0.8});

// ============ SCENE ============
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0a08);
scene.fog=new THREE.FogExp2(0x0a0a08,0.015);

const camera=new THREE.PerspectiveCamera(82,window.innerWidth/window.innerHeight,0.1,180);
const renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:'high-performance'});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.5;
document.body.insertBefore(renderer.domElement,document.body.firstChild);

// ============ LIGHTING ============
const amb=new THREE.AmbientLight(0x334455,0.5);
scene.add(amb);
const hemi=new THREE.HemisphereLight(0x556677,0x111111,0.3);
scene.add(hemi);

const droneLight=new THREE.SpotLight(0xeeeeff,4,50,Math.PI/5,0.5,1);
scene.add(droneLight);
scene.add(droneLight.target);

const fill=new THREE.PointLight(0x445566,1,25);
scene.add(fill);

// ============ AUDIO ============
let audioCtx,masterGain,droneGain,musicGain;
let audioStarted=false;

function initAudio(){
if(audioStarted)return;
audioStarted=true;
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
masterGain=audioCtx.createGain();
masterGain.gain.value=0.3;
masterGain.connect(audioCtx.destination);

// Drone hum - very soft
droneGain=audioCtx.createGain();
droneGain.gain.value=0.05;
droneGain.connect(masterGain);

const droneOsc1=audioCtx.createOscillator();
droneOsc1.type='sine';
droneOsc1.frequency.value=85;
const droneFilter1=audioCtx.createBiquadFilter();
droneFilter1.type='lowpass';
droneFilter1.frequency.value=150;
droneOsc1.connect(droneFilter1);
droneFilter1.connect(droneGain);
droneOsc1.start();

const droneOsc2=audioCtx.createOscillator();
droneOsc2.type='sine';
droneOsc2.frequency.value=170;
const droneFilter2=audioCtx.createBiquadFilter();
droneFilter2.type='lowpass';
droneFilter2.frequency.value=200;
droneOsc2.connect(droneFilter2);
droneFilter2.connect(droneGain);
droneOsc2.start();

// LFO for drone
const lfo=audioCtx.createOscillator();
lfo.type='sine';
lfo.frequency.value=0.3;
const lfoGain=audioCtx.createGain();
lfoGain.gain.value=8;
lfo.connect(lfoGain);
lfoGain.connect(droneOsc1.frequency);
lfoGain.connect(droneOsc2.frequency);
lfo.start();

// Ambient mystery music
musicGain=audioCtx.createGain();
musicGain.gain.value=0.04;
musicGain.connect(masterGain);

const padOsc1=audioCtx.createOscillator();
padOsc1.type='triangle';
padOsc1.frequency.value=65;
const padFilt1=audioCtx.createBiquadFilter();
padFilt1.type='lowpass';
padFilt1.frequency.value=200;
padOsc1.connect(padFilt1);
padFilt1.connect(musicGain);
padOsc1.start();

const padOsc2=audioCtx.createOscillator();

function playCollectSound(){
if(!audioCtx)return;
const osc=audioCtx.createOscillator();
osc.type='sine';
osc.frequency.value=880;
const g=audioCtx.createGain();
g.gain.value=0.06;
g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);
osc.connect(g);
g.connect(masterGain);
osc.start();
osc.stop(audioCtx.currentTime+0.2);
// Second harmonic
const osc2=audioCtx.createOscillator();
osc2.type='sine';
osc2.frequency.value=1320;
const g2=audioCtx.createGain();
g2.gain.value=0.03;
g2.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15);
osc2.connect(g2);
g2.connect(masterGain);
osc2.start();
osc2.stop(audioCtx.currentTime+0.15);
}

function playCrashSound(){
if(!audioCtx)return;
const bufferSize=audioCtx.sampleRate*0.3;
const buffer=audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);
const data=buffer.getChannelData(0);
for(let i=0;i<bufferSize;i++){
data[i]=(Math.random()*2-1)*Math.exp(-i/bufferSize*5);
}
const source=audioCtx.createBufferSource();
source.buffer=buffer;
const g=audioCtx.createGain();
g.gain.value=0.08;
const filt=audioCtx.createBiquadFilter();
filt.type='lowpass';
filt.frequency.value=800;
source.connect(filt);
filt.connect(g);
g.connect(masterGain);
source.start();
}

// ============ DYNAMIC JOYSTICK ============
let joyActive=false,joyTouchId=null;
let joyBaseX=0,joyBaseY=0;
let joyIn={x:0,y:0};
const MAX_JOY=40;
let joyBaseEl=null,joyThumbEl=null;

function createJoyElements(){
joyBaseEl=document.createElement('div');
joyBaseEl.style.cssText=`position:fixed;width:${MAX_JOY*2+20}px;height:${MAX_JOY*2+20}px;
border-radius:50%;background:radial-gradient(circle,rgba(0,255,100,0.03) 0%,rgba(0,255,100,0.1) 70%,rgba(0,255,100,0.15) 100%);
border:2px solid rgba(0,255,100,0.2);pointer-events:none;z-index:35;display:none;
transform:translate(-50%,-50%);`;
joyThumbEl=document.createElement('div');
joyThumbEl.style.cssText=`position:absolute;width:40px;height:40px;border-radius:50%;
background:radial-gradient(circle,rgba(0,255,100,0.6) 0%,rgba(0,255,100,0.15) 100%);
border:2px solid rgba(0,255,100,0.4);top:50%;left:50%;
transform:translate(-50%,-50%);box-shadow:0 0 12px rgba(0,255,100,0.25);
pointer-events:none;`;
joyBaseEl.appendChild(joyThumbEl);
document.body.appendChild(joyBaseEl);
}
createJoyElements();

// Handle touch on entire screen for joystick
document.addEventListener('touchstart',e=>{
if(gameState!=='playing')return;
for(let t of e.changedTouches){
if(t.clientX>window.innerWidth*0.6)continue; // Right side = other controls (future)
joyActive=true;
joyTouchId=t.identifier;
joyBaseX=t.clientX;
joyBaseY=t.clientY;
joyBaseEl.style.display='block';
joyBaseEl.style.left=joyBaseX+'px';
joyBaseEl.style.top=joyBaseY+'px';
updateJoy(t.clientX,t.clientY);
}
},{passive:false});

document.addEventListener('touchmove',e=>{
e.preventDefault();
for(let t of e.changedTouches){
if(t.identifier===joyTouchId) updateJoy(t.clientX,t.clientY);
}
},{passive:false});

document.addEventListener('touchend',e=>{
for(let t of e.changedTouches){
if(t.identifier===joyTouchId){
joyActive=false;joyTouchId=null;
joyIn.x=0;joyIn.y=0;
joyThumbEl.style.transform='translate(-50%,-50%)';
joyBaseEl.style.display='none';
}
}
});

// Mouse fallback
let mouseDown=false;
document.addEventListener('mousedown',e=>{
if(e.clientX>window.innerWidth*0.6)return;
mouseDown=true;joyActive=true;
joyBaseX=e.clientX;joyBaseY=e.clientY;
joyBaseEl.style.display='block';
joyBaseEl.style.left=joyBaseX+'px';
joyBaseEl.style.top=joyBaseY+'px';
updateJoy(e.clientX,e.clientY);
initAudio();
});
document.addEventListener('mousemove',e=>{
if(mouseDown)updateJoy(e.clientX,e.clientY);
});
document.addEventListener('mouseup',()=>{
mouseDown=false;joyActive=false;
joyIn.x=0;joyIn.y=0;
joyThumbEl.style.transform='translate(-50%,-50%)';
joyBaseEl.style.display='none';
});

function updateJoy(cx,cy){
let dx=cx-joyBaseX,dy=cy-joyBaseY;
const d=Math.sqrt(dx*dx+dy*dy);
if(d>MAX_JOY){dx=dx/d*MAX_JOY;dy=dy/d*MAX_JOY;}
joyIn.x=dx/MAX_JOY;joyIn.y=dy/MAX_JOY;
joyThumbEl.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
}

function addMesh(parent,geo,mat,x,y,z,rx,ry,rz){
const m=new THREE.Mesh(geo,mat);
if(x!==undefined)m.position.set(x,y||0,z||0);
if(rx)m.rotation.x=rx;if(ry)m.rotation.y=ry;if(rz)m.rotation.z=rz;
parent.add(m);return m;
}

const ta=(Math.random()-0.5)*0.5;
group.rotation.y=ta;
group.userData.radius=3;

// Main body
addMesh(group,new THREE.BoxGeometry(2.8,3,10),matTrain,0,1.8,0);
// Roof
addMesh(group,new THREE.BoxGeometry(2.8,0.2,10),matTrain,0,3.4,0);
// Front face
addMesh(group,new THREE.BoxGeometry(2.8,3,0.15),matTrain,0,1.8,5);
// Windows (side)
for(let w=0;w<5;w++){
for(let side=-1;side<=1;side+=2){
addMesh(group,new THREE.BoxGeometry(0.03,0.7,1),matTrainWin,
side*1.42,2.2,-3.5+w*1.8);
}
}
// Doors
for(let side=-1;side<=1;side+=2){
addMesh(group,new THREE.BoxGeometry(0.03,1.8,0.7),matTrainWin,side*1.42,1.1,-1);
addMesh(group,new THREE.BoxGeometry(0.03,1.8,0.7),matTrainWin,side*1.42,1.1,2);
}
// Wheels
for(let ax=-3.5;ax<=3.5;ax+=3.5){
for(let s=-1;s<=1;s+=2){
addMesh(group,new THREE.CylinderGeometry(0.25,0.25,0.12,6),matDark,s*1,0.25,ax,0,0,Math.PI/2);
}
}
// Damage
addMesh(group,new THREE.BoxGeometry(1.5,1,0.08),matRust,0,1.2,-5.05);
addMesh(group,new THREE.BoxGeometry(0.8,0.6,0.08),matRust,0.5,2.5,-5.05);
// Interior light
const tl=new THREE.PointLight(0xff6633,0.3,5);
tl.position.set(0,2,0);
group.add(tl);
// Broken window glass pieces
for(let g=0;g<3;g++){
addMesh(group,new THREE.BoxGeometry(0.3+Math.random()*0.3,0.02,0.2+Math.random()*0.2),matGlass,
(Math.random()-0.5)*2,0.05,(Math.random()-0.5)*1,
Math.random()*0.3,Math.random()*Math.PI,Math.random()*0.3);
}
break;
}
case 'collapsed':{
const cx=(Math.random()-0.5)*(TW-4);
addMesh(group,new THREE.BoxGeometry(3.5,0.4,4),matConcrete,cx,1.2,0);
for(let r=0;r<8;r++){
addMesh(group,new THREE.BoxGeometry(0.2+Math.random()*0.6,0.15+Math.random()*0.3,0.2+Math.random()*0.5),
matConcrete,cx+(Math.random()-0.5)*2.5,0.08+(Math.random()-0.5)*0.05,(Math.random()-0.5)*2.5,
Math.random()*0.2,Math.random()*Math.PI,Math.random()*0.2);
}
// Hanging debris
addMesh(group,new THREE.BoxGeometry(1.5,0.8,1.5),matConcrete,cx+(Math.random()-0.5),TH-0.4,(Math.random()-0.5)*0.5,
Math.random()*0.15);
// Rebar
for(let r=0;r<4;r++){
addMesh(group,new THREE.CylinderGeometry(0.012,0.012,0.8+Math.random()*0.5,3),matRust,
cx+(Math.random()-0.5)*1.5,Math.random()*2.5,(Math.random()-0.5)*1.5,
Math.random(),0,Math.random());
}
group.userData.radius=2.5;
break;
}
case 'fallen_beam':{
const fx=(Math.random()-0.5)*(TW-6);
addMesh(group,new THREE.BoxGeometry(0.8,0.3,7),matRust,fx,0.8,0,0,Math.random()*0.2);
addMesh(group,new THREE.BoxGeometry(0.6,0.25,5),matRust,fx+0.3,0.6,0.5,0,Math.random()*0.15);
for(let c=0;c<4;c++){
addMesh(group,new THREE.BoxGeometry(0.4+Math.random()*0.4,0.25+Math.random()*0.3,0.3+Math.random()*0.4),
matConcrete,fx+(Math.random()-0.5)*2.5,0.15,(Math.random()-0.5)*2.5);
}
group.userData.radius=2;
break;
}
}

group.position.set(0,0,z);
return group;
}

// ============ BATTERY ============
function createBattery(z){
const group=new THREE.Group();
// Body
addMesh(group,new THREE.BoxGeometry(0.3,0.5,0.1),new THREE.MeshStandardMaterial({
color:0x00aa44,emissive:0x003311,roughness:0.3,metalness:0.5}));
// Terminal
addMesh(group,new THREE.BoxGeometry(0.1,0.06,0.12),matMetal,0,0.28,0);
// Plus
addMesh(group,new THREE.BoxGeometry(0.05,0.1,0.015),new THREE.MeshBasicMaterial({color:0xffffff}),0,0.12,0.06);
// Glow
addMesh(group,new THREE.SphereGeometry(0.4,6,6),new THREE.MeshBasicMaterial({
color:0x00ff64,transparent:true,opacity:0.1}));
const bl=new THREE.PointLight(0x00ff64,0.6,5);
group.add(bl);

group.position.set((Math.random()-0.5)*(TW-5),1.5+Math.random()*(TH-4),z);
group.userData={type:'battery',radius:0.6,baseY:group.position.y,phase:Math.random()*Math.PI*2};
return group;
}

// ============ PARTICLES ============
function spawnParticles(pos,color,count){
for(let i=0;i<count;i++){
const p=addMesh(scene,new THREE.BoxGeometry(0.03,0.03,0.03),
new THREE.MeshBasicMaterial({color,transparent:true,opacity:1}),
pos.x+(Math.random()-0.5)*0.3,pos.y+(Math.random()-0.5)*0.3,pos.z+(Math.random()-0.5)*0.3);
p.userData.vel=new THREE.Vector3((Math.random()-0.5)*0.15,(Math.random()-0.5)*0.15,(Math.random()-0.5)*0.15);
p.userData.life=1;p.userData.decay=0.025+Math.random()*0.025;
particles.push(p);
}
}

function updateParticles(dt){
for(let i=particles.length-1;i>=0;i--){
const p=particles[i];
p.userData.life-=p.userData.decay;
p.position.add(p.userData.vel);
p.material.opacity=p.userData.life;
p.scale.setScalar(p.userData.life);
if(p.userData.life<=0){scene.remove(p);p.geometry.dispose();p.material.dispose();particles.splice(i,1);}
}
}

// ============ INIT ============
function initGame(){
tunnelSegs.forEach(s=>scene.remove(s));
obstacles.forEach(o=>scene.remove(o));
batteries.forEach(b=>scene.remove(b));
particles.forEach(p=>{scene.remove(p);p.geometry.dispose();p.material.dispose();});
lights=[];

tunnelSegs=[];obstacles=[];batteries=[];particles=[];

for(let i=0;i<10;i++){
const seg=createSegment(-i*SEG);
scene.add(seg);
tunnelSegs.push({mesh:seg,z:-i*SEG});
}

for(let i=2;i<10;i++){
const numObs=1+Math.floor(Math.random()*3);
for(let j=0;j<numObs;j++){
const obs=createObstacle(-i*SEG+Math.random()*SEG);
scene.add(obs);obstacles.push(obs);
}
if(Math.random()<0.5){
const bat=createBattery(-i*SEG+Math.random()*SEG);
scene.add(bat);batteries.push(bat);
}
}

dronePos={x:0,y:2.5,z:0};
droneRot={x:0,z:0};
speed=0;battery=100;score=0;
invTimer=0;shake={x:0,y:0,z:0};
signalStrength=0.8;gameTime=0;recSeconds=0;
}

// ============ COLLISION ============
function checkColl(obj,pos,r){
const dx=obj.position.x-pos.x,dy=obj.position.y-pos.y,dz=obj.position.z-pos.z;
return Math.sqrt(dx*dx+dy*dy+dz*dz)<(obj.userData.radius||1)+r;
}

// ============ UI ============
const batteryBar=document.getElementById('battery-bar');
const batteryText=document.getElementById('battery-text');
const speedDisp=document.getElementById('speed-display');
const scoreDisp=document.getElementById('score-display');
const zoneDisp=document.getElementById('zone-display');
const dmgFlash=document.getElementById('damage-flash');
const colFlash=document.getElementById('collect-flash');
const proxWarn=document.getElementById('proximity-warning');
const lowWarn=document.getElementById('low-battery-warning');
const fpsEl=document.getElementById('fps-counter');
const signalNoise=document.getElementById('signal-noise');
const signalText=document.getElementById('signal-text');
const signalBars=document.querySelectorAll('.signal-bar');
const recTime=document.getElementById('rec-time');

function updateUI(){
batteryBar.style.width=battery+'%';
batteryText.textContent=Math.round(battery)+'%';
speedDisp.textContent=Math.round(speed*100);
scoreDisp.textContent=Math.round(score)+'m';
zoneDisp.textContent=ZONES[currentZone];

lowWarn.style.display=battery<25?'block':'none';
if(battery<25)lowWarn.style.opacity=Math.sin(Date.now()*0.006)*0.5+0.5;

const nearWall=Math.abs(dronePos.x)>TW/2-1.5||dronePos.y>TH-1.2||dronePos.y<0.6;
proxWarn.style.display=nearWall?'block':'none';

// Signal bars
const bars=Math.round(signalStrength*5);
signalBars.forEach((b,i)=>b.classList.toggle('active',i<bars));
signalText.textContent='SIGNAL: '+Math.round(signalStrength*100)+'%';

// Signal noise overlay
signalNoise.style.opacity=(1-signalStrength)*0.3;

// Recording time
const mins=Math.floor(recSeconds/60).toString().padStart(2,'0');
const secs=Math.floor(recSeconds%60).toString().padStart(2,'0');
recTime.textContent=mins+':'+secs;
}

// ============ GAME OVER ============
function gameOver(){
gameState='gameover';
document.getElementById('final-score').textContent=Math.round(score)+'m';
document.getElementById('final-zone').textContent='Reached: '+ZONES[currentZone];
document.getElementById('game-over-screen').style.display='flex';
}

// ============ MAIN LOOP ============
function loop(ts){
requestAnimationFrame(loop);

const dt=Math.min((ts-lastTime)/1000,0.05);
lastTime=ts;

frameCount++;
if(ts-fpsTime>1000){fps=frameCount;fpsEl.textContent=fps+' FPS';frameCount=0;fpsTime=ts;}

if(gameState!=='playing'){renderer.render(scene,camera);return;}

gameTime+=dt;
recSeconds+=dt;

// Signal strength variation
signalStrength=0.6+Math.sin(gameTime*0.3)*0.2+Math.sin(gameTime*1.7)*0.1;
// Signal drops near obstacles
let nearObstacle=false;
for(let o of obstacles){
if(Math.abs(o.position.z-dronePos.z)<8&&Math.abs(o.position.x-dronePos.x)<4){
nearObstacle=true;break;
}
}
if(nearObstacle)signalStrength*=0.7;
signalStrength=Math.max(0.2,Math.min(1,signalStrength));

// Battery
battery-=dt*(1+speed*0.4);
if(battery<=0){battery=0;gameOver();return;}

// Speed
if(speed<MAX_SPEED)speed+=ACCEL;
// Slow down near walls
if(Math.abs(dronePos.x)>TW/2-2.5)speed*=0.98;

// Movement
const moveX=joyIn.x*6*dt;
const moveY=-joyIn.y*4.5*dt;
dronePos.x+=moveX;
dronePos.y+=moveY;
dronePos.z-=speed*dt*55;
score=Math.abs(dronePos.z);

// Clamp
dronePos.x=Math.max(-TW/2+0.7,Math.min(TW/2-0.7,dronePos.x));
dronePos.y=Math.max(0.25,Math.min(TH-0.7,dronePos.y));

// Rotation (for camera)
droneRot.x=-moveY*2;
droneRot.z=-moveX*2;

// Lights follow
droneLight.position.set(dronePos.x,dronePos.y+1,dronePos.z);
droneLight.target.position.set(dronePos.x,dronePos.y,dronePos.z-8);
fill.position.set(dronePos.x,dronePos.y-1,dronePos.z-12);

// Drone audio modulation
if(droneGain){
droneGain.gain.value=0.03+speed*0.03;
}

// Wall collision
if(Math.abs(dronePos.x)>TW/2-0.9||dronePos.y>TH-0.8||dronePos.y<0.4){
battery-=dt*6;
dmgFlash.style.opacity=0.2;
shake.x=(Math.random()-0.5)*0.15;
shake.y=(Math.random()-0.5)*0.15;
if(Math.random()<0.05)spawnParticles(new THREE.Vector3(dronePos.x,dronePos.y,dronePos.z),0xff4400,2);
}else{
dmgFlash.style.opacity*=0.9;
shake.x*=0.9;shake.y*=0.9;shake.z*=0.9;
}

// Invincibility
if(invTimer>0)invTimer-=dt;

// Obstacle collision
if(invTimer<=0){
for(let i=0;i<obstacles.length;i++){
const obs=obstacles[i];
if(Math.abs(obs.position.z-dronePos.z)<5&&checkColl(obs,dronePos,DRONE_R)){
battery-=15;
invTimer=0.8;
dmgFlash.style.opacity=0.5;
shake={x:(Math.random()-0.5)*0.5,y:(Math.random()-0.5)*0.5,z:(Math.random()-0.5)*0.25};
spawnParticles(new THREE.Vector3(dronePos.x,dronePos.y,dronePos.z),0xff0040,8);
playCrashSound();
// Signal disruption on crash
signalStrength=Math.max(0.2,signalStrength-0.3);
if(battery<=0){battery=0;gameOver();return;}
break;
}
}
}

// Battery collection
for(let i=batteries.length-1;i>=0;i--){
const bat=batteries[i];
if(Math.abs(bat.position.z-dronePos.z)<4){
const dx=bat.position.x-dronePos.x;
const dy=bat.position.y-dronePos.y;
const dz=bat.position.z-dronePos.z;
if(Math.sqrt(dx*dx+dy*dy+dz*dz)<1.2){
battery=Math.min(100,battery+15);
colFlash.style.opacity=0.4;
setTimeout(()=>colFlash.style.opacity=0,120);
spawnParticles(bat.position.clone(),0x00ff64,8);
playCollectSound();
scene.remove(bat);
batteries.splice(i,1);
}
}
}

// Animate batteries
const time=ts*0.002;
batteries.forEach(b=>{
b.position.y=b.userData.baseY+Math.sin(time+b.userData.phase)*0.2;
b.rotation.y=time*0.4+b.userData.phase;
if(b.children[2])b.children[2].scale.setScalar(1+Math.sin(time*1.5)*0.15);
});

// Flickering lights
lights.forEach(l=>{
if(l.userData.flicker){
const f=Math.sin(time*l.userData.flickerSpeed+l.userData.flickerPhase);
l.intensity=l.userData.baseIntensity?l.userData.baseIntensity*(f>0?1:0.1):0.8*(f>0?1:0.15);
}
if(!l.userData.baseIntensity)l.userData.baseIntensity=l.intensity;
});

// Blinking obstacle lights
obstacles.forEach(obs=>{
obs.traverse(c=>{
if(c.userData&&c.userData.blink){
c.material.opacity=Math.sin(time*4)*0.3+0.3;
}
});
});

// Particles
updateParticles(dt);

// Manage segments
while(tunnelSegs.length<10){
const lastZ=tunnelSegs[tunnelSegs.length-1]?.z||0;
const newZ=lastZ-SEG;
const seg=createSegment(newZ);
scene.add(seg);
tunnelSegs.push({mesh:seg,z:newZ});

const numObs=1+Math.floor(Math.random()*Math.min(4,1+score/400));
for(let j=0;j<numObs;j++){
const obs=createObstacle(newZ+Math.random()*SEG);
scene.add(obs);obstacles.push(obs);
}
if(Math.random()<0.5){
const bat=createBattery(newZ+Math.random()*SEG);
scene.add(bat);batteries.push(bat);
}
}

while(tunnelSegs.length>0&&tunnelSegs[0].z>dronePos.z+SEG*3){
const s=tunnelSegs.shift();
scene.remove(s.mesh);
s.mesh.traverse(c=>{
if(c.geometry)c.geometry.dispose();
if(c.material){if(Array.isArray(c.material))c.material.forEach(m=>m.dispose());else c.material.dispose();}
});
}

obstacles=obstacles.filter(o=>{
if(o.position.z>dronePos.z+SEG*2){
scene.remove(o);
o.traverse(c=>{
if(c.geometry)c.geometry.dispose();
if(c.material){if(Array.isArray(c.material))c.material.forEach(m=>m.dispose());else c.material.dispose();}
});
return false;
}
return true;
});

batteries=batteries.filter(b=>{
if(b.position.z>dronePos.z+SEG*2){
scene.remove(b);
b.traverse(c=>{
if(c.geometry)c.geometry.dispose();
if(c.material){if(Array.isArray(c.material))c.material.forEach(m=>m.dispose());else c.material.dispose();}
});
return false;
}
return true;
});

// Camera (FPV - no drone visible)
camera.position.set(
dronePos.x+shake.x,
dronePos.y+0.05+shake.y,
dronePos.z+0.2+shake.z
);
camera.rotation.x=droneRot.x*0.3;
camera.rotation.z=droneRot.z*0.15;
// Slight forward look
camera.rotation.x-=0.05;

updateUI();
renderer.render(scene,camera);
}

// ============ EVENTS ============
document.addEventListener('click',()=>initAudio(),{once:false});
document.addEventListener('touchstart',()=>initAudio(),{once:false});

document.getElementById('restart-btn').addEventListener('click',()=>{
document.getElementById('game-over-screen').style.display='none';
gameState='playing';
initGame();
});

window.addEventListener('resize',()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

// ============ START ============
lastTime=performance.now();
initGame();
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
